<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fef8f3] dark:bg-[#1a1a2e] text-[#1a1a2e] dark:text-[#fef8f3] docked full-width top-0 backdrop-blur-md bg-opacity-80 flex justify-between items-center w-full px-6 h-16 sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-secondary border border-secondary/20">
<span class="font-headline italic text-sm">EA</span>
</div>
<h1 class="font-headline text-2xl tracking-tighter">Estefan AI Vision</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl">logout</span>
</button>
</header>
<main class="flex-1 px-6 pt-8 pb-32 max-w-2xl mx-auto w-full relative">
<!-- Logo Watermark Background -->
<div class="fixed inset-0 pointer-events-none flex items-center justify-center overflow-hidden z-0">
<span class="font-headline italic text-[40rem] text-secondary ea-monogram-watermark select-none">EA</span>
</div>
<div class="relative z-10">
<!-- Header Section -->
<div class="mb-10 text-center">
<span class="font-label uppercase tracking-widest text-xs text-secondary mb-2 block">Selección de IA</span>
<h2 class="font-headline text-4xl text-primary-container leading-tight">Elige cómo quieres usar la IA</h2>
</div>
<!-- Mode Selector Grid -->
<div class="grid grid-cols-1 gap-6 md:grid-cols-2 md:gap-8">
<!-- Mode A: Suggestion -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest transition-all duration-300 hover:translate-y-[-4px] active:scale-[0.98] text-left overflow-hidden">
<!-- High-end gradient border simulation -->
<div class="absolute inset-0 border border-secondary/10 group-hover:border-secondary/30 rounded-xl pointer-events-none"></div>
<div class="w-14 h-14 mb-8 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-3xl" data-icon="psychology">psychology</span>
</div>
<h3 class="font-headline text-2xl text-primary-container mb-3">La IA sugiere</h3>
<p class="text-on-surface-variant leading-relaxed text-sm mb-6">
                        Analizo el rostro y propongo 2 peinados ideales adaptados a tu estructura facial.
                    </p>
<div class="mt-auto flex items-center text-secondary font-semibold text-xs uppercase tracking-widest">
<span>Iniciar análisis</span>
<span class="material-symbols-outlined ml-2 text-sm">arrow_forward</span>
</div>
</button>
<!-- Mode B: Try-on -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-primary-container transition-all duration-300 hover:translate-y-[-4px] active:scale-[0.98] text-left overflow-hidden">
<div class="w-14 h-14 mb-8 rounded-full bg-on-tertiary-container/20 flex items-center justify-center text-on-tertiary-container">
<span class="material-symbols-outlined text-3xl" data-icon="keyboard" style="font-variation-settings: 'FILL' 1;">keyboard</span>
</div>
<h3 class="font-headline text-2xl text-surface-bright mb-3">Probar un corte</h3>
<p class="text-surface-variant/70 leading-relaxed text-sm mb-6">
                        Escribe un peinado y te muestro cómo quedaría usando nuestra tecnología Modo B.
                    </p>
<div class="mt-auto flex items-center text-on-tertiary-container font-semibold text-xs uppercase tracking-widest">
<span>Modo B Activo</span>
<span class="material-symbols-outlined ml-2 text-sm">auto_awesome</span>
</div>
</button>
</div>
</div>
</main>
